mqtt:
  enabled: false

auth:
  enabled: false

detectors:
  ov:
    type: openvino
    device: GPU

model:
  model_type: yolo-generic
  path: /openvino-model/yolov8n/yolov8n_openvino_model/yolov8n.xml
  width: 320
  height: 320
  input_tensor: nchw
  input_pixel_format: bgr

record:
  enabled: true
  continuous:
    days: 30
  motion:
    days: 30
go2rtc:
  streams:
    doorbell_1:
      - rtsp://admin:July122010@192.168.40.100:554/
    doorbell_2:
      - rtsp://admin:July122010@192.168.40.100:554/h264Preview_01_sub

cameras:
  doorbell:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/doorbell_1
          input_args: preset-rtsp-restream
          roles:
            - record
            - audio
        - path: rtsp://127.0.0.1:8554/doorbell_2
          input_args: preset-rtsp-restream
          roles:
            - detect
    detect:
      enabled: true
      fps: 5
version: 0.17-0
