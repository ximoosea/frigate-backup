cameras:
  shop_inside:
    ui: {order: 2}
    enabled: true
    friendly_name: Shop Inside
    detect:
      fps: 5
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/shop_inside_sub
          input_args: preset-rtsp-restream
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/shop_inside_main
          input_args: preset-rtsp-restream
          roles:
            - record
            - audio
    live:
      streams:
        Stream 1: shop_inside_main
        Stream 2: shop_inside_sub

  front_door:
    ui: {order: 3}
    enabled: true
