mqtt:
  enabled: true
  host: localhost  # Local only, no external broker needed

auth:
  enabled: false

ffmpeg:
  hwaccel_args: preset-vaapi

detectors:
  ov:
    type: openvino
    device: GPU

model:
  model_type: yolo-generic
  path: /openvino-model/yolov8n/yolov8n_openvino_model/yolov8n.xml
  width: 320
  height: 320
  input_tensor: nchw
  input_pixel_format: bgr

record:
  enabled: true
  continuous:
    days: 30
  motion:
    days: 30

objects:
  track:
    - person
    - car

go2rtc:
  streams:
    # Doorbell (192.168.40.100) - needs opus line for 2-way audio
    doorbell_1:
      - rtsp://admin:July122010@192.168.40.100:554/h264Preview_01_main
      - ffmpeg:doorbell_1#audio=opus
    doorbell_2:
      - rtsp://admin:July122010@192.168.40.100:554/h264Preview_01_sub
