mqtt:
  enabled: false

auth:
  enabled: false

ffmpeg:
  hwaccel_args: preset-vaapi

detectors:
  ov:
    type: openvino
    device: GPU

model:
  model_type: yolo-generic
  path: /openvino-model/yolov8n/yolov8n_openvino_model/yolov8n.xml
  width: 320
  height: 320
  input_tensor: nchw
  input_pixel_format: bgr

record:
  enabled: true
  continuous:
    days: 30
  motion:
    days: 30

go2rtc:
  streams:
    doorbell_1:
      - "ffmpeg:http://192.168.40.100/flv?port=1935&app=bcs&stream=channel0_main.bcs&user=admin&password=July122010#video=copy#audio=copy#audio=opus"
    doorbell_2:
      - "ffmpeg:http://192.168.40.100/flv?port=1935&app=bcs&stream=channel0_sub.bcs&user=admin&password=July122010"

    front_door_1:
      - rtsp://admin:July122010@192.168.40.70:554/cam/realmonitor?channel=1&subtype=0&unicast=true
    front_door_2:
      - rtsp://admin:July122010@192.168.40.70:554/cam/realmonitor?channel=1&subtype=1&unicast=true

    garage_1:
